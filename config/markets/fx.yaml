# config/markets/fx.yaml — FX sleeve config'i (EXPANSION.md Bölüm 11.3)
market:
  market_id: fx
  calendar_id: FX_24_5
  currency: USD
  direction_mode: two_sided            # short gate seti tanımlanana dek fiilen long_only koşar (Bölüm 8)
  settlement_days: 0
  qty_step: 1
  price_decimals: 5
  cost_model_id: fx
  data_adapter_id: oanda
  max_leverage: 5.0                    # muhafazakâr; SPK senaryosu üst sınır 10.0
  eval_after_close_min: 10
instruments:
  - {symbol: EUR_USD, pip_size: 0.0001, spread_pips: 0.9,
     swap_long_annual_pct: -2.0, swap_short_annual_pct: -0.5}   # muhafazakâr placeholder; E1/E3'te güncelle, kaynak yaz
  - {symbol: GBP_USD, pip_size: 0.0001, spread_pips: 1.2,
     swap_long_annual_pct: -2.0, swap_short_annual_pct: -1.0}
  - {symbol: USD_JPY, pip_size: 0.01,  spread_pips: 1.0,
     swap_long_annual_pct: 0.0,  swap_short_annual_pct: -4.0}
signal:                                # bist bloğu baz; kalibrasyon E4'te
  ema_fast: 50
  ema_slow: 200
  adx_period: 14
  adx_min: 25
  rsi_period: 14
  rsi_entry_low: 40
  rsi_entry_high: 55
  macd: [12, 26, 9]
  atr_period: 14
  atr_stop_mult: 1.5
  atr_anomaly_mult: 2.0
  bb_period: 20
  bb_std: 2.0
  swing_lookback: 50
  swing_fractal_n: 2
  volume_confirm_mult: 1.5
  min_history_bars: 260
gate_profile:
  entry: [trend, regime, rsi, macd, atr_anomaly, bb_overextension,
          structure_rr, trigger_4h, mtf]        # volume YOK (Bölüm 8)
risk:                                  # bist bloğu baz + margin kontrolleri Bölüm 9.2
  risk_per_trade_pct: 0.0075
  daily_loss_limit_pct: 0.025
  weekly_loss_limit_pct: 0.05
  max_open_positions: 2
  max_position_notional_pct: 0.25
  max_drawdown_breaker_pct: 0.10
  min_rr: 1.8
  correlation_lookback_days: 90
  correlation_max: 0.85
  news_blackout: true
costs:
  triple_swap_wednesday: true
  slippage_pips: 0.3
vetoes:
  econ_blackout: {enabled: true, impact: high, hours_before: 12, hours_after: 12}
backtest:
  start: "2010-01-01"                  # OANDA/yedek veri derinliğine göre E1'de kesinleşir
  benchmark: "cash_only"               # FX'te al-tut anlamsız; kıyas: sıfır-getiri + swap notu
