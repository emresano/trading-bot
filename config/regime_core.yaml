# config/regime_core.yaml
# S1 spike backtest — Rejim-Filtreli Çekirdek (D1 tasarımı, STATUS.md KALICI KAYIT 3).
# Bu, config/config.yaml'DAN AYRI, bağımsız bir dosyadır — config/config.yaml
# HİÇBİR ŞEKİLDE değiştirilmedi/okunmadı; maliyet değerleri (commission_bps,
# slippage_bps, initial_equity) buraya ELLE KOPYALANDI (config.yaml'daki
# `costs`/`paper.initial_equity` bloklarıyla aynı sayısal değerler, otomatik
# senkronizasyon YOK — kasıtlı, bağımsızlık ilkesi gereği).

# Strateji ailesi seçimi (P1 üretim portu) — bu config regime_core ailesini seçer.
# config/config.yaml bu alanı İÇERMEZ → orada varsayılan ten_gate (10-gate huni).
strategy_family: regime_core

symbols:
  - THYAO
  - GARAN
  - ASELS
  - AKBNK
  - KCHOL
  - SAHOL
  - EREGL
  - TUPRS
  - TCELL
  - TOASO
  - SISE
  - ARCLK

# D1 tasarımı — test-öncesi mühürlendi, bu turda değiştirilmez.
regime:
  ma_period: 200        # N
  band_pct: 0.01         # b
  confirm_days: 3        # M (giriş teyidi; çıkış her zaman 1 gün)

# config/config.yaml'daki costs bloğuyla AYNI sayısal değerler (elle kopyalandı).
costs:
  commission_bps: 10
  slippage_bps: 5

initial_equity: 100000

# Walk-forward (B) pencere takvimi — config/config.yaml'daki
# backtest.walk_forward bloğuyla AYNI değerler (elle kopyalandı). Parametre
# optimizasyonu YOK — N/b/M yukarıdaki sabit değerlerle her pencerede AYNEN kullanılır.
walk_forward:
  train_months: 24
  test_months: 6
  step_months: 6

monte_carlo:
  runs: 500
  random_seed: 42

# Uçurum kontrolü grid'i (D) — SEÇİM İÇİN DEĞİL, yalnızca komşuluk sürekliliği.
cliff_grid:
  ma_period: [100, 150, 200, 250]
  band_pct: [0.0, 0.01, 0.02]
  confirm_days: [1, 3, 5]

backtest:
  start: "2005-01-01"
  snapshot: "data/snapshots/2026-07-06"

benchmark:
  index_symbol: "XU100"
  index_yf_symbol: "XU100.IS"

# S1b — nakit-getiri düzeltmesi (madde 2). N/b/M ve maliyetler YUKARIDA
# AYNEN kalır, bu blok yalnızca rejim KAPALI (nakit) günlerde nakdin
# tahakkuk edip etmeyeceğini kontrol eder. `--cash-yield` CLI bayrağı
# verilmezse bu blok hiç okunmaz (S1 davranışı, tahakkuk yok).
cash_yield:
  enabled: true
  aux_snapshot: "data/snapshots/aux/2026-07-07/TRY_ON_RATE.parquet"
  haircut_bps: 200   # bkz. backtest/regime_core.py::CASH_YIELD_HAIRCUT (0.02 olarak sabit kodlanmış, burada yalnızca belge amaçlı)
