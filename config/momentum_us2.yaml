# config/momentum_us2.yaml
# D2US-S1 — KESİTSEL MOMENTUM ailesi (D2-US) araştırma yapılandırması.
# config/config.yaml (canlı bot), config/regime_core.yaml (BIST D1),
# config/regime_core_us.yaml (E4 D1-US) dosyalarından AYRI ve BAĞIMSIZDIR —
# o dosyaların HİÇBİRİ okunmadı/değiştirilmedi. Canlı bot bu dosyayı OKUMAZ
# (yalnızca offline araştırma sürücüsü tools/run_xsec_momentum_us2.py okur).
#
# ═══════════════════════════════════════════════════════════════════════════
# MÜHÜRLÜ DEĞİŞMEZLER (disiplin #3 — parametre/varyant taraması YASAK).
# Tüm tasarım sabitleri KOŞUMDAN ÖNCE, literatür varsayılanlarıyla mühürlendi;
# koşum sonucuna göre HİÇBİR bileşen seçilmez. Ablasyon/komşuluk YALNIZ bilgi.
# İnsan-okur mühür ve gerekçe: D2US_CRITERIA.md (bu commit'te birlikte).
# ═══════════════════════════════════════════════════════════════════════════

