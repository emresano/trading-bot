# deploy/tradingbot.newsyslog.conf — macOS log rotasyonu (F5-B1)
#
# launchd StandardOut/ErrorPath log'ları (paper.*.log, watchdog.*.log) büyümesin
# diye newsyslog ile döndürülür. macOS'ta newsyslog periyodik çalışır (günlük).
#
# KURULUM (operatör, bir kez):
#   sudo cp deploy/tradingbot.newsyslog.conf /etc/newsyslog.d/tradingbot.conf
#   (yolları/ kullanıcıyı Mac Mini'ye göre düzenle)
#   Test: sudo newsyslog -nv /etc/newsyslog.d/tradingbot.conf
#
# Alanlar: logfilename [owner:group] mode count size when flags
#   mode=644, count=7 arşiv, size=1024 KB'da döndür, J=bzip2 sıkıştır, günlük denetim.
#
# NOT: decision_journal.jsonl DÖNDÜRÜLMEZ — o append-only DENETİM İZİdir (audit
# trail, CLAUDE.md Bölüm 5). Arşivleme gerekirse operatör aylık kopyalar
# (cp decision_journal.jsonl archive/decision_journal_YYYYMM.jsonl), silmez.

# logfilename                                                    mode count size when flags
/Users/sano/trading-bot/runtime/paper/logs/paper.out.log         644  7     1024 *    J
/Users/sano/trading-bot/runtime/paper/logs/paper.err.log         644  7     1024 *    J
/Users/sano/trading-bot/runtime/paper/logs/watchdog.out.log      644  7     1024 *    J
/Users/sano/trading-bot/runtime/paper/logs/watchdog.err.log      644  7     1024 *    J
